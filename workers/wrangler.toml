name = "wawa-smart-erp-api"
main = "src/index.ts"
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]

# 개발 환경
[env.development]
name = "wawa-smart-erp-api-dev"
routes = [
  { pattern = "http://localhost:8787/*", zone_name = "localhost" }
]

# 프로덕션 환경 (배포 후 설정)
[env.production]
routes = [
  { pattern = "api.wawa.app/*", zone_name = "wawa.app" }
]

# D1 데이터베이스
[[d1_databases]]
binding = "DB"
database_name = "wawa-smart-erp"
database_id = "9e485667-419d-4fb8-ae28-c3a2a69bd8a1"

# KV 스토어 (세션, 캐시)
[[kv_namespaces]]
binding = "KV"
id = "858af78c9d0b4a0ab94f786a5ddf79e8"
preview_id = "d8cbd478e5eb4e6aa164f9e012a3687c"

# R2 버킷 (파일 저장소)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "wawa-smart-erp"
jurisdiction = "eu"

# 기본 환경 변수 (wrangler deploy 시 사용)
[vars]
API_URL = "https://wawa-smart-erp-api.zeskywa499.workers.dev"
FRONTEND_URL = "https://wawa.app"
STUDENT_APP_URL = "https://learn.wawa.app"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "info"

# 개발 환경 변수 (wrangler dev 시 자동 오버라이드)
[env.development.vars]
ENVIRONMENT = "development"
API_URL = "http://localhost:8787"
FRONTEND_URL = "http://localhost:5174"
STUDENT_APP_URL = "http://localhost:5175"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "debug"

[env.production.vars]
API_URL = "https://wawa-smart-erp-api.zeskywa499.workers.dev"
FRONTEND_URL = "https://wawa.app"
STUDENT_APP_URL = "https://learn.wawa.app"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "info"

# 마이그레이션 설정
[[migrations]]
tag = "v1"
