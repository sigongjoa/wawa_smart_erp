name = "wawa-smart-erp-api"
main = "src/index.ts"
compatibility_date = "2025-04-08"
compatibility_flags = ["nodejs_compat"]

# 개발 환경 (테스트 D1 바인딩)
[env.development]
name = "wawa-smart-erp-api-dev"
routes = [
  { pattern = "http://localhost:8787/*", zone_name = "localhost" }
]

[[env.development.d1_databases]]
binding = "DB"
database_name = "wawa-smart-erp-test"
database_id = "e437ddbc-efc3-40d8-b0a5-2cdc58c4c1b3"

[[env.development.kv_namespaces]]
binding = "KV"
id = "d8cbd478e5eb4e6aa164f9e012a3687c"
preview_id = "d8cbd478e5eb4e6aa164f9e012a3687c"

[[env.development.r2_buckets]]
binding = "BUCKET"
bucket_name = "wawa-smart-erp"
jurisdiction = "eu"

# 프로덕션 환경 — 반드시 --env production 플래그로만 접근
[env.production]
# api.wawa.app zone 이 Cloudflare 계정에 아직 등록 안 되어 있어서 route 는 보류.
# workers.dev 서브도메인(wawa-smart-erp-api-production.<acct>.workers.dev)으로 노출.
workers_dev = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "wawa-smart-erp"
database_id = "9e485667-419d-4fb8-ae28-c3a2a69bd8a1"

[[env.production.kv_namespaces]]
binding = "KV"
id = "858af78c9d0b4a0ab94f786a5ddf79e8"
preview_id = "d8cbd478e5eb4e6aa164f9e012a3687c"

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "wawa-smart-erp"
jurisdiction = "eu"

# D1 데이터베이스 — top-level 은 test DB 로 바꿔서 환경 미지정 시 prod 를 때리지 않도록 함
[[d1_databases]]
binding = "DB"
database_name = "wawa-smart-erp-test"
database_id = "e437ddbc-efc3-40d8-b0a5-2cdc58c4c1b3"

# KV 스토어 (세션, 캐시) — preview 는 로컬/테스트용
[[kv_namespaces]]
binding = "KV"
id = "d8cbd478e5eb4e6aa164f9e012a3687c"
preview_id = "d8cbd478e5eb4e6aa164f9e012a3687c"

# R2 버킷 (파일 저장소)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "wawa-smart-erp"
jurisdiction = "eu"

# 기본 환경 변수 (wrangler deploy 시 사용)
# top-level 은 test DB 를 향하므로 ENVIRONMENT=development 로 명시한다 —
# prod 는 반드시 `wrangler deploy --env production` 으로만 접근.
[vars]
ENVIRONMENT = "development"
API_URL = "http://localhost:8787"
FRONTEND_URL = "http://localhost:5174"
STUDENT_APP_URL = "http://localhost:5175"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "debug"

# 개발 환경 변수 (wrangler dev 시 자동 오버라이드)
[env.development.vars]
ENVIRONMENT = "development"
API_URL = "http://localhost:8787"
FRONTEND_URL = "http://localhost:5174"
STUDENT_APP_URL = "http://localhost:5175"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "debug"

[env.production.vars]
ENVIRONMENT = "production"
API_URL = "https://wawa-smart-erp-api.zeskywa499.workers.dev"
FRONTEND_URL = "https://wawa.app"
STUDENT_APP_URL = "https://learn.wawa.app"
JWT_EXPIRES_IN = "3600"
REFRESH_TOKEN_EXPIRES_IN = "2592000"
LOG_LEVEL = "info"

# Cron Triggers — 1분마다 만료된 exam_attempts 자동 처리
[triggers]
crons = ["* * * * *"]

# 마이그레이션 설정
[[migrations]]
tag = "v1"
